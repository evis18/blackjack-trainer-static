<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blackjack Trainer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="table">
      <section class="trainer" aria-labelledby="title">
        <header class="topbar">
          <div>
            <h1 id="title">Blackjack Trainer</h1>
            <p>6-deck H17, DAS, RSA, blackjack pays 3:2. Units only.</p>
          </div>
          <div class="stats" aria-live="polite">
            <span id="bankroll">Units 0.0</span>
            <span id="accuracy">Strategy 0/0</span>
          </div>
        </header>

        <section class="felt" aria-live="polite">
          <div class="hand dealer-area">
            <div class="hand-heading">
              <h2>Dealer</h2>
              <span id="dealer-total"></span>
            </div>
            <div id="dealer-cards" class="cards"></div>
          </div>

          <div class="hand player-area">
            <div class="hand-heading">
              <h2 id="player-label">Your hand</h2>
              <span id="player-total"></span>
            </div>
            <div id="player-cards" class="cards"></div>
          </div>
        </section>

        <section class="controls">
          <button id="hit-button" type="button">Hit</button>
          <button id="stand-button" type="button">Stand</button>
          <button id="double-button" type="button">Double</button>
          <button id="split-button" type="button">Split</button>
        </section>

        <section class="deal-controls">
          <label class="bet-control">
            Bet
            <input id="bet-input" type="number" min="1" max="100" step="1" value="1">
          </label>
          <button id="deal-button" class="deal-button" type="button">Deal</button>
        </section>

        <section class="feedback" aria-live="polite">
          <p id="strategy-feedback">Make your play.</p>
          <p id="round-feedback"></p>
        </section>

        <section class="hands-strip" aria-label="Split hands">
          <div id="hand-tabs" class="hand-tabs"></div>
        </section>

        <section class="strategy-card-wrap">
          <button id="strategy-card-button" class="secondary hold-button" type="button">
            Hold for strategy card
          </button>
          <div id="strategy-card" class="strategy-card" hidden>
            <h2>H17 Basic Strategy</h2>
            <p class="card-note">Wynn-style 6-deck H17, DAS, RSA. Surrender spots fall back to the playable action in this trainer.</p>
            <div id="strategy-card-tables" class="strategy-tables"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
